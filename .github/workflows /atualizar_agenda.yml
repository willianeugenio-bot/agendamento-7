name: Atualizar Agenda Vida com CNPJ
on:
  repository_dispatch:
    types: [atualizar-agenda]
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  atualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar Dependências
        run: pip install requests

      - name: Executar Script de Coleta
        env:
          CALENDLY_TOKEN: ${{ secrets.CALENDLY_TOKEN }}
        run: python coletar_dados.py

      - name: Salvar alterações
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add horarios.json
          if ! git diff --cached --exit-code; then
            git commit -m "Agenda Vida com CNPJ atualizada"
            git push
          else
            echo "Nenhuma mudança detectada."
          fi
